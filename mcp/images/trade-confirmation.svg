<svg xmlns="http://www.w3.org/2000/svg" width="600" height="580" viewBox="0 0 600 580">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="580" fill="#ffffff" rx="12"/>

  <!-- Status icon -->
  <circle cx="300" cy="40" r="24" fill="#dcfce7"/>
  <text x="300" y="48" font-size="24" text-anchor="middle" fill="#16a34a">✓</text>

  <!-- Title -->
  <text x="300" y="84" font-size="18" font-weight="700" fill="#0f172a" text-anchor="middle">Trade Executed!</text>
  <text x="300" y="104" font-size="14" fill="#64748b" text-anchor="middle">Arbitrage trade placed on both platforms</text>

  <!-- Profit Summary Card -->
  <rect x="16" y="120" width="568" height="110" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="28" y="142" font-size="12" font-weight="700" fill="#166534">PROFIT SUMMARY</text>

  <!-- Grid: Guaranteed Profit -->
  <text x="28" y="168" font-size="11" fill="#4ade80">Guaranteed Profit</text>
  <text x="28" y="196" font-size="22" font-weight="800" fill="#16a34a">$0.78</text>

  <!-- Grid: Edge -->
  <text x="300" y="168" font-size="11" fill="#64748b">Edge</text>
  <text x="300" y="194" font-size="18" font-weight="700" fill="#15803d">5.20%</text>

  <!-- Grid: Total Cost -->
  <text x="28" y="222" font-size="11" fill="#64748b">Total Cost</text>
  <text x="100" y="222" font-size="15" font-weight="600" fill="#1e293b">$14.22</text>

  <!-- Grid: ROI -->
  <text x="300" y="222" font-size="11" fill="#64748b">ROI</text>
  <text x="330" y="222" font-size="15" font-weight="600" fill="#1e293b">5.4%</text>

  <!-- Opportunity description -->
  <rect x="16" y="240" width="568" height="32" rx="6" fill="#f8fafc"/>
  <text x="28" y="260" font-size="13" fill="#475569">Buy YES Chiefs-Bills on Kalshi + Buy NO on Polymarket</text>

  <!-- Platform cards side by side -->
  <!-- Kalshi -->
  <rect x="16" y="284" width="275" height="130" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="28" y="306" font-size="11" font-weight="700" fill="#3b82f6">KALSHI</text>

  <text x="28" y="328" font-size="12" fill="#64748b">Ticker</text>
  <text x="260" y="328" font-size="12" font-weight="600" fill="#1e40af" text-anchor="end">KXNFL-CHIEFS</text>

  <text x="28" y="348" font-size="12" fill="#64748b">Side</text>
  <text x="260" y="348" font-size="12" font-weight="600" fill="#1e40af" text-anchor="end">YES</text>

  <text x="28" y="368" font-size="12" fill="#64748b">Quantity</text>
  <text x="260" y="368" font-size="12" font-weight="600" fill="#1e40af" text-anchor="end">15</text>

  <text x="28" y="388" font-size="12" fill="#64748b">Price</text>
  <text x="260" y="388" font-size="12" font-weight="600" fill="#1e40af" text-anchor="end">47.0¢</text>

  <text x="28" y="408" font-size="12" fill="#64748b">Cost</text>
  <text x="260" y="408" font-size="12" font-weight="600" fill="#1e40af" text-anchor="end">$7.05</text>

  <!-- Polymarket -->
  <rect x="303" y="284" width="281" height="130" rx="8" fill="#fdf4ff" stroke="#e9d5ff"/>
  <text x="315" y="306" font-size="11" font-weight="700" fill="#7e22ce">POLYMARKET</text>

  <text x="315" y="328" font-size="12" fill="#64748b">Slug</text>
  <text x="552" y="328" font-size="12" font-weight="600" fill="#4c1d95" text-anchor="end">chiefs-bills-winner</text>

  <text x="315" y="348" font-size="12" fill="#64748b">Side</text>
  <text x="552" y="348" font-size="12" font-weight="600" fill="#4c1d95" text-anchor="end">No</text>

  <text x="315" y="368" font-size="12" fill="#64748b">Quantity</text>
  <text x="552" y="368" font-size="12" font-weight="600" fill="#4c1d95" text-anchor="end">15</text>

  <text x="315" y="388" font-size="12" fill="#64748b">Price</text>
  <text x="552" y="388" font-size="12" font-weight="600" fill="#4c1d95" text-anchor="end">47.8¢</text>

  <text x="315" y="408" font-size="12" fill="#64748b">Cost</text>
  <text x="552" y="408" font-size="12" font-weight="600" fill="#4c1d95" text-anchor="end">$7.17</text>

  <!-- Placed Orders Section -->
  <text x="16" y="440" font-size="12" font-weight="700" fill="#374151">PLACED ORDERS</text>

  <!-- Order 1 -->
  <rect x="16" y="450" width="568" height="32" rx="6" fill="#f8fafc"/>
  <rect x="28" y="455" width="50" height="18" rx="3" fill="#eff6ff"/>
  <text x="36" y="468" font-size="10" font-weight="700" fill="#1d4ed8">KALSHI</text>
  <text x="90" y="468" font-size="12" fill="#1e293b">KXNFL-CHIEFS · YES · 15 @ 47.0¢</text>
  <text x="552" y="468" font-size="12" font-weight="600" fill="#16a34a" text-anchor="end">resting</text>

  <!-- Order 2 -->
  <rect x="16" y="488" width="568" height="32" rx="6" fill="#f8fafc"/>
  <rect x="28" y="493" width="80" height="18" rx="3" fill="#fdf4ff"/>
  <text x="36" y="506" font-size="10" font-weight="700" fill="#7e22ce">POLYMARKET</text>
  <text x="120" y="506" font-size="12" fill="#1e293b">chiefs-bills-winner · NO · 15 @ 47.8¢</text>
  <text x="552" y="506" font-size="12" font-weight="600" fill="#16a34a" text-anchor="end">active</text>

  <!-- Dry run warning (shown as example) -->
  <!-- <rect x="16" y="530" width="568" height="32" rx="6" fill="#fef9c3" stroke="#fde047"/> -->
  <!-- <text x="28" y="550" font-size="12" fill="#713f12">⚠️ Dry run — no real trades were placed.</text> -->
</svg>